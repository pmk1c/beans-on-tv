name: Main CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

defaults:
  tools:
    node: 24.15.0

jobs:
  check:
    name: Run vp check
    steps:
      - uses: eas/checkout
      - name: Install Vite+
        run: curl -fsSL https://vite.plus | bash
      - name: Install dependencies
        run: ~/.vite-plus/bin/vp install
      - name: Generate Prisma client
        run: DATABASE_URL="dummy" ~/.vite-plus/bin/vp exec prisma generate
      - name: Validate workspace
        run: ~/.vite-plus/bin/vp check

  publish_update:
    name: Publish production update
    needs: [check]
    type: update
    environment: production
    params:
      branch: production

  # development_fingerprint:
  #   name: Calculate development fingerprint
  #   needs: [check]
  #   type: fingerprint
  #   environment: development

  # development_ios_get_build:
  #   name: Find matching iOS development build
  #   needs: [development_fingerprint]
  #   type: get-build
  #   params:
  #     platform: ios
  #     profile: development
  #     channel: development
  #     distribution: internal
  #     wait_for_in_progress: true
  #     fingerprint_hash: ${{ needs.development_fingerprint.outputs.ios_fingerprint_hash }}

  # development_ios_build:
  #   name: Build iOS development client if fingerprint changed
  #   needs: [development_ios_get_build]
  #   if: ${{ !needs.development_ios_get_build.outputs.build_id }}
  #   type: build
  #   params:
  #     platform: ios
  #     profile: development

  production_fingerprint:
    name: Calculate production fingerprint
    needs: [check]
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
    type: fingerprint
    environment: production

  # production_android_get_build:
  #   name: Find matching Android production build
  #   needs: [production_fingerprint]
  #   type: get-build
  #   params:
  #     platform: android
  #     profile: production
  #     channel: production
  #     distribution: store
  #     wait_for_in_progress: true
  #     fingerprint_hash: ${{ needs.production_fingerprint.outputs.android_fingerprint_hash }}

  # production_android_build:
  #   name: Build Android production if fingerprint changed
  #   needs: [production_android_get_build]
  #   if: ${{ !needs.production_android_get_build.outputs.build_id }}
  #   type: build
  #   params:
  #     platform: android
  #     profile: production

  production_ios_get_build:
    name: Find matching iOS production build
    needs: [production_fingerprint]
    type: get-build
    params:
      platform: ios
      profile: production
      channel: production
      distribution: store
      wait_for_in_progress: true
      fingerprint_hash: ${{ needs.production_fingerprint.outputs.ios_fingerprint_hash }}

  production_ios_build:
    name: Build iOS production if fingerprint changed
    needs: [production_ios_get_build]
    if: ${{ !needs.production_ios_get_build.outputs.build_id }}
    type: build
    params:
      platform: ios
      profile: production

  production_ios_submit:
    name: Submit iOS production
    after: [production_ios_get_build, production_ios_build]
    if: ${{ after.production_ios_get_build.outputs.build_id || after.production_ios_build.outputs.build_id }}
    type: submit
    environment: production
    params:
      build_id: ${{ after.production_ios_get_build.outputs.build_id || after.production_ios_build.outputs.build_id }}
      profile: production
